body:
  text: 附錄用筆賦用筆賦秦漢魏至今隸書其惟鍾繇草有黃綺張芝至於用筆神妙不可得而詳悉也夫賦以布諸懷抱擬形於翰墨也辭曰何異人之挺發精博善而含章馳鳳門而獸據浮碧水而龍驤滴秋露而垂玉搖春條而不長飄飄遠逝浴天池而頡頏翱翔弄翮淩輕霄而接行詳其真體正作高強勁實方員窮金石之麗纖麤盡凝脂之密藏骨抱筋含文包質沒沒汨汨若濛氾之落銀鉤耀耀晞晞狀扶桑之掛朝日或有飄颻騁巧其若自然包羅羽客總括神仙李氏韜光類隱龍而怡情王喬脫屣欻飛鳧而上征或改變駐筆破真成草養德儼如威而不猛遊絲斷而還續龍鸞群而不諍髮指冠而皆裂據純鉤而耿耿忽瓜割兮互裂復交結而成族若長天之陣雲如倒松之臥谷時滔滔而東注乍紐山兮暫塞射雀目以施巧拔長虵兮盡力草草眇眇或連或絕如花亂飛遙空舞雪時行時止或臥或蹶透嵩華兮不高踰懸壑兮非越信能經大緯地毗助王猷耽之翫之功積山丘吁嗟秀逸萬代嘉休顯允哲人於今鮮儔共六合而俱永與兩曜而同流鬱高峰兮偃蓋如萬歲兮千秋墨池編臨護軍教臨護軍教今所任要在於公役均平其羗太史忠謹在公者覆行諸營家至人告暢吾乃心其有老落篤癃不堪從役或有飢寒之色不能自存者區分處別自當參詳其宜御覽二百四十與殷浩書與殷浩書下官乃勸令畫廉藺於屏風北堂書鈔一百三十二御覽七百一筆經筆經漢時諸郡獻兔毫出鴻都惟有趙國毫中用時人咸言兔毫無優劣管手有巧拙初學記二十一有人以綠沈漆竹管及鏤管見遺錄之多年斯亦可愛玩詎必金寶彫琢然後為寶也初學記二十一昔人或以瑠璃象牙為筆管麗飾則有之然筆須輕便重則躓矣初學記二十一采毫竟以麻紙裹柱根次取上毫薄薄布令柱不見然後安之初學記二十一雜帖雜帖足下小大佳也諸疾苦憂勞非一如何復得都下近問不吾得敬和廿三日書無他重熙住定為善謝二侯今付吳興酢二器時行皆徧事輕耳彼云何復委篤恐無興理諸人書亦云爾也憂之怛怛得停乃公私大計也臣羲之言寒嚴不審聖體御膳何如謹付承動靜臣羲之言臣羲之言伏惟陛下天縱聖哲德齊二儀應期承運踐登大祚普天率土莫不同慶臣抱疾遐外不獲隨例瞻望宸極屏營一隅臣羲之言九月二十五日羲之頓首便陟冬日時速感歎兼哀傷切不能自勝奈何得七月末時書為慰始欲寒足下常疾比何似每耿耿吾故不平復憂悴力困不一一王羲之頓首七月五日羲之頓首昨便斷草葬送期近痛傷情深奈何奈何得去月二十八日告具問慰懷力還不次王羲之頓首羲之死罪去冬在東鄮因還使白牋伏想至自頃公私無信便故不復承動靜至於詠德之深無日有隧省告可謂眷顧之至尋翫三四但有悲慨民年以西夕而衰疾日甚自恐無蹔展語平生理也以此忘情將無其人何以復言惟願珍重為國為家時垂告慰絕筆情塞羲之死罪宿息想足下安書吾猶不勝能佳一十早往遲王羲之頓首寂不得都問知卿云曰問故未知西審問使人憂耿得問示足下晚可耳至劣劣力不一一王羲之白此信過不得熙書想其書一一也小大佳不賓轉勝皆謝之賢妹大都勝前至不欲食篤羸恆令人憂餘粗佳餘皆平安也吾復五六日至東縣還復至問大婚定芳勢道也親往為慰思後諸能數不想昨咁兄以日此粗佳二謝叔喪興公近便索然玄度來數日有疾患便復來阿萬小差大事問有重慮安佳行來遇大蕩然阮公政散耿懷祖可呼賀祭酒俱初月二日羲之頓首忽然此年感遠兼傷情痛切心奈何奈何念君哀窮奄經新故仰慕崩絕豈可堪忍比各何似相憂不忘當深消息以全勉為大僕衰老殆是日不如日力知問王羲之頓首謝范新婦得富春還諸道路安穩甚慰心比日涼即至平安也上下集聚欣慶也華等佳不自新婦母子去寂寞難言思子輩不可言九家真慰鸞開鶴瑞集客登秦望書一紙孔侍郎著作朝當時侍從庾參軍兄弟三人輒承命參軍弟至都孫道常約孔東遷駒承命長曹言切勑侍從承命謝功曹長旭故夫謝輶死罪死罪奉命輒侍從孔孝廉前吏孔琨死罪命違輒侍從王征東郎最言輒當侍從孫參軍定伯承命桓安西觀自代蜀五重熙去具今子日與曹諭謝嶧吾又不下蔡書一一足下清談想必有理耳長任比得解未吾與江生論書答如此足下思所向示之要至懷也須卿示誠非復至書言所然於義故後來之今不能忘懷曹庾王六君別羲之頓首君可不語差也耿耿力乏問王羲之頓首知汝殊愁且得還為佳也冠軍蹔暢釋當不得極蹤可恨吾病來不辦行動潛不可耳終年纏此當復何理耶且方有此分張不知比去復得一會不講竟不竟可恨汝還當思更就理一昨遊悉誰同故數往虎丘不此甚蕭索祖希時面因行藥欲數處看過還復共集散耳不見奴粗悉書云見左軍彌數聽論政也今欲歸復何適報之遣不知總散討竝侍郎耶言別事有及過謝憂勤二月八日復得鄱陽等多時不耳為慰如何平安等人當與行不足不過彼與消息得長風書靈柩幽隔卅年心想平昔痛慕崩絕豈可居處抽裂不能自勝謝書已乞日安厝即其情事長畢奈何松等隕慟哀情頓泄亦難可言郗還未卜聊示友中郎相憂不去心感遠懷近增傷惋每見范母子哀號使人情悲疾不退潛損亦當日深豈可以常理待之此豈常憂不審食復何如云肌色可可所堪轉勝復以此為慰馳竦耳疾患差也念憂勞王羲之頓首適重熙書如此果爾乃堪可憂張平不立勢向河南者不知諸侯何以當之熙表故未出不說說荀侯疾患想當轉佳耳若熙自勉此一役當可言淺見實不見今時兵任可處理不知夜來下意竟乏新故之際致歎良深君亦同懷近信過得告故云腹痛懸情災雨比復何似氣力能勝不僕為爾耳力不具一一王羲之不審比出日集聚不一爾緬然恐東旋未期諸情罔欲速知決近復因還信書至也臨河敘臨河敘永和九年歲在癸丑暮春之初會於會稽山陰之蘭亭修褉事也群賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次是日也天朗氣清惠風和畼娛目騁懷信可樂也雖無絲竹管絃之盛一觴一詠亦足以畼敘幽情矣故列序時人錄其所述右將軍司馬太原孫丞公等二十六人賦詩如左前餘姚令會稽謝勝等十五人不能賦詩罰酒各三斗世說企羨篇注遊四郡記遊四郡記永寍縣界海中有松門西岸及嶼上皆生松故名松門藝文類聚八十八又御覽九百五十三書論書論夫三端之妙莫先乎用筆六藝之奧莫若乎銀鉤昔秦丞相李斯見周穆王書七日興歎患其無骨蔡尚書入鴻都觀碣十旬不返嗟其出群故知達其源者少闇其理者多近代以來多不師古緣情棄道纔記姓名學不該贍聞見又寡致使成功不就虛費精力自非通靈感物不可與談斯道矣今刪李斯筆妙更加潤色總七條并作其形容列事如左貽諸子孫永為模範庶將來君子時復覽焉要先取崇山絕仞中兔毛八月九月收之筆頭長一寸管長五寸鋒齊要強者硯取煎涸新石潤澀相兼又浮津耀墨者其墨取廬山之松煙代郡之鹿角膠十年已上強如石者紙取東陽魚卵虛柔滑淨者然後靜神慮思揮襟作之先學執筆若真書去頭二寸一分若行草書去頭三寸一分執之下墨點畫芟波屈曲真草皆須盡一身之力而送之若初學先大書不得從小善鑒者不寫善寫者不鑒善筆力者多骨不善筆力多肉多骨微肉者謂之筋書多肉微骨者謂之墨豬多力豐筋者勝無力無筋者病一一從其消息而用之若作橫畫必須隱隱然可畏若作蹙鋒如長風忽起蓬勃一家若飄散離合如雲中別鶴遙遙然若作引戈如百鈞弩發若作抽針如萬歲枯藤若作屈曲如武人勁弩觔節若作波如崩浪雷奔若作鉤如山將岌岌然夫執筆有七種有心急而執筆緩者有心緩而執筆急者若執筆近而不能豎者心手不齊意後筆前者敗若執筆遠而急心前筆後者勝又有十一種結搆員滿如篆法飄颺灑落如章草兇險可畏如八分窈窕出入如飛白耿介峙立如鶴頭鬱跋縱橫如古隸盡心存委曲每為字各一象其形斯道妙矣書道畢矣永和四年於上虞製記墨池編
