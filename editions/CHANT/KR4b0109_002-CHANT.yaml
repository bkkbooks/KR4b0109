body:
  text: 卷二方回帖昨方回遂舉為侍中不知卒行不云相意未許爾者為佳比得其書云山海間民逃亡殊異永嘉乃以五百戶去深可憂深可憂此間不得至比足下郡內云何糧運日廣遠恐此不弊不已羲之報又方回遂舉為侍中都下書云殷生議論殊異處憂之道故思同歲寒盡對此書還又二謝在此近終日不同之此歎恨不得方回知春後問令人怛怛重熙帖古之御世者乃志小天下今封域區區一方任耳而恒憂不治為時恥之但今卿重熙之徒必得申其道更自行有餘力相弘也又昨得熙廿六日書云患氣懸情嘉賓帖數親問叔穆嘉賓竝有問為慰二郗帖想彼人士平安二郗數也敬豫諸人近來停數日悉佳安石已南遷其諸兄弟此改殊命蕭索聞君以復入相府何時當應命未得坐處亦當愁罔思得為鄰豈常情恐君方處務此命難期如之何不一一小佳復意問也又姊適復二告安和郗故病篤無復他治為消息耳憂之深今移至田舍就道家也事畢當吾遣信視淑還母子平安為慰至恨不得暫見故未得下船道夷書云已得一宅想今安穩耳不政解此移趨知部兒不快何所在今已佳也耿耿信白荀侯帖遠近清和士人平安荀侯定住下邳復遣軍下城此間民事愚智長歎乃亦無所隱如之何又須求雨以復為災卿彼何似又荀侯佳不未果就卿深企懷耳安好音信明公還得歸洛也計令解有懸休尋謝仁祖帖在我而已誠無所多云與謝豫州共入河不乃煩劇得安萬送書云六日可至諸賢云朝廷失之轉覺闕然與卿書同不有君子其能國乎此言深也但云卿當入何以如夢恐卿表將復經年想仁祖差時還內鎮慰人情耳皆在卿懷矣又想官舍佳見護軍近書甚慰仁祖轉嘉然疾根不除尚令人憂復得問未復反書甚慰入月共至窟山看甘橘思君宜深想鐵已還旦夕展也故復旨示羲之報又忽然夏中感懷冷冷不適足下復何似耿耿吾故不佳得遠近問不虞生何當來遲一集昨見無奕十九日書二十六日西也云仁祖服石散一齊不覺佳酷羸至可憂力知問王羲之書白又君頃復以何散懷鐵云秋當解褐行復分張想君比爾快為樂彥仁書云仁祖家欲至蕪湖單弱令俜何所成君書得載停郡迎喪甚事宜但異域之乖素已不可言何時可得發安石帖安石定目絕令人悵然一爾恐未卒有散理期諸處分猶未定憂縣益深念君馳情又遣從事發遣君無復坐理交疾患何以堪此何以堪此恐屬無所復厝懷即乖大小不可言且憂君以疾他曳不易萬石帖適萬石去月五日書為慰尋得彭祖送萬九日露版再破賊有所獲想足摧寇越逸之勢宜適許司農書為慰無人未能得重故向餘杭間又若治風教可弘今忠著於上義行於下雖古之逸士亦將眷然況下此者觀頃舉厝君子之道盡矣今得護軍還君屈以申時玄平頃命朝有君子曉然復謂有容足地常如前者雖患九天不可階九地無所逃何論於世路萬石僕雖不敏不能期之以道義豈苟且若復以此進退直是利動之徒耳所不忍為所不以為又昨暮得無奕阿萬此月二日書甚近清和耳羌賊故在許下自當了也桓公未有行日阿萬定吳興又產婦兒萬留之月盡遣甚慰心又向亦得萬書委曲備悉使人慨然見足下乃悉知叔虎剋昨發月半略必至未見勞參軍又三月十六日羲之白一昨省不悉雨快君可不萬石轉差也灸得力不不得後問懸悒不知懷君云當有旨信遲望其至僕劣劣故遣不具還具示王羲之謝光祿帖謝光祿亦垂命可憂念念一朝奄忽傷人懷今年彫落可哀歎二謝帖二謝致喪興公近便索然玄度來數日有疾患便復來阿萬小差阮公政耿耿懷祖可呼賀祭酒俱又得袁二謝書具為慰袁生暫至都已還未此生至到之懷吾所盡也弟預須遇之大事得其書無已已二謝云秋末必來計日遲望萬羸不知必俱不知弟往別停幾日決其兵為樂也尋分旦與江姚女和別殊當不可言也謝生帖得書知足下且欲顧何以不進耶向與謝生書說欲往知登停山停山非所辯故可共集謝生處登山可他日耶王羲之白又謝生多在山下不復見且得書疾惡冷耿耿想數知問雖能還不能數可歎不審比出日集聚不一爾緬然恐東旋未期諸情罔罔又上流近問不竟何日即路知謝定出居內所弘故重是不情廢情存大又王逸少頓首謝七日登秦望可俱行當早也又知欲東先期共至謝欲處云何欲行想忘耳過此如命又謝書云云今送謝司馬帖十一月廿七日羲之報得十四十八日二書知問為慰寒切此各佳不念憂勞久懸情吾食至少劣劣力因謝司馬書不具羲之報玄度帖君昨示欲見穆生敘讚今欲默語興廢之格粗當書爾不玄度好佳君謂何似又知玄度在彼善悉也無繇見之此何可言又見君小大佳不過此乃知熙佳覺少不得同萬恨萬恨云出便當西念遠別何可云遲見玄度今或以在道又未得安西問玄度忽腫至可憂慮得其昨書云小差然疾候自恐難耶又玄度先乃可耳嘗謂有理因祠祀絕多感其夜便至此致之生而速之死每尋痛惋不能已已省君書增酸悲大分自不可移時至不可以智力救如此又服食故不可乃將冷藥僕即復是中之者腸胃中一冷不可如何是以要春秋輒大起多腹中不調適君宜深以為意省君書亦比得之物養之妙豈復容言直無其人耳許君見驗何煩多云矣又痛念玄度立如志而更速禍可惋可痛者省君書亦增酸又得西問無他想彼人甚平安此粗佳玄度來數日為慰又不得西問耿耿許君帖知念許君與足下意政同但今非致言地甚勑勑亦不知范生以居職未以卿示輒便及之吾尚不能惜小節目但一開無解已又亦終無能為益適足為煩瀆足下呼爾不論諸葛昏書二族舊對故欲結援諸葛若以家窮自當供助昏事欲速知決諸葛𠫤帖諸葛𠫤者君識之不才幹好佳往為錢塘著績又入僕府有以盡悉宰民之至也甚欲自托於明德云臨安春當缺爾者君能請不僕必欲言得佳長史亦當是君所須既得里人共事異常故乃爾須還告之弘遠帖未復弘道近書見與弘遠書恐卿不得久坐何如休稚玄佳不想數得足下旨令知問又見弘遠二書皆以達也動散即佳為慰又昨見君歡復無喻然未善悉想宿昔可耳脅中云何一善消息值周轉勝也耿耿疾患小差與弘遠俱詣遲共寫懷王羲之又弘遠比當造頃遲見此子真以日為歲足下得審問旨令吾阮光祿帖九月二十八日羲之頓首頓首昨者書想至參軍近有慰阮光祿信在耳許中郎家欲因書比去報知庾君遂不救疾摧切心情不得自甚痛當奈何深當寬勉以不忘先心臨紙但有酸惻王羲之頓首又阮公故爾可憂時放恕大事今令速言何方守篤大灸不得力而從事以至甚無計自必出惟須小佳鐵石今出求救足下可復助且令得通又范公及阮公既并微旨足下謂合損益之宜不又知劉公差甚慰甚慰知前乃爾委頓追以怛然今轉平復也阮公近聞不萬轉差也又此鄙問無恙諸從皆佳此諸數耳知劉阮數又從事經過崔阮諸人昨旦與書疾故示毒愁當增其疾吾如今尚劣劣又晚熱未有定發日有定示足下興耳迎書或欲留吾甚欲與俱而吾疾患遲速無常其竟云何足下今知問又阮生何如此粗平安數問為慰又知阮生轉佳甚慰甚慰會稽近患下始差諸謝粗佳又向遣書想夜至得書知足下問當遠行諸懷何可言一十必早發想足下如向期也阮侯止於界上耳向書已具不復一一王羲之白范公帖范公書如此今示君須庾見故當勸果之告旨語君遲而不可言范生帖大都夏冬自可足麥秋輒有違此亦人之常期等平安在此羸小差知諸賢佳數見范生亦得玄近書為慰又得孔郗王書亦云不能數何爾須江生可耳斷絕也尚未見傳女足下言極是有懷甚佳羊參軍帖羊參軍還朝論長見敦恕其為慶慰無物以喻今又告誠先靈以文示足下感懷慟心又書雖備至聚宜有以宣事情今遣羊參軍西諸懷所具必欲今觀想可思今得時面克令得還也又羊參軍尋至具一一子期諸人何似耿耿曹參軍帖想曹參軍疾者已往必能同來參軍帖近書至也得十八日書為慰雨蒸比各可不參軍轉差也懸耿吾胛痛劇灸不得力至患之不得書自力數字又月半念足下窮思深至不可居忍雨濕體氣各何如參軍得針灸力不甚懸情當深寬割情通省苦遣不具王羲之白白牒帖五月二十七日州民王羲之死罪死罪此夏復便半惟違離眾情兼至時增傷悼頃水雨未之有不審尊體如何得疾除也不承近問馳企民自服橡屑下斷體氣便自差強此物益人斷下去陟釐劫樊遠也以為良方出何是真此之謂謹及因青州白牒不備羲之死罪死罪周參軍帖羲之死罪死罪近因周參軍白牒伏想必達此春以過時速與深兼哀傷摧切割心情奈何奈何須臾寒食節不審尊體何如不承問以經月馳企民疾根治滯了無差候轉久憂深叔遣信自力粗白不宣備羲之死罪死罪虞休意帖卿與虞休意書有所問足下旨為致誠答令旨意致來勿忘此意自決今以資嚴知小大疾患念勞心董祥帖問董祥吾亦問之冀必來兵時得之甚佳頃日憒憒不暇復此省示及乃復憶之耳馮公帖今與馮公論何產足下可思助明清談至是舉今又語真道今宣旨矣溫公帖溫公在此前東北面還此復初散為慰便乞良不可言卿得知之復共一快樂周常侍帖此書因周常侍想必至徐舍人帖適州將十五日告徐一癰方尺許口四寸云數如來小如差然疾源如此憂怛尚深故遣信治徐舍人書以示徐還示足下也不堪縲疑事列上台周青州視事今以當至下耶甚是事宜無方身世而任事者疾患如此使人短氣徐侯帖侍中書書徐侯遂危篤恐無復冀深令人反側朱博士帖藥湯諸人佳也今知問朱博士何當還君可致意令速還想無稽留王會稽帖今與王會稽丘山陰書借人想故當有所得又語丘令臨葬必得耳暨主簿帖十二月六日羲之報一昨因暨主簿不悉昨得去月十五日二十三日二書為慰雨晝夜無解夜來復雪弟各可也此日中冷患之始小佳力及不一一羲之報劉生帖得都近問清和為慰云劉生近欲舉君為山陰以中當為最君期於未獲供養處相為慨然仕宦殆是想也二蔡帖二蔡過葬來居此親親集事而君復出為因耳江侯帖賢室何如何可為心惟絕難與人理耳諸患猶爾憂勞深似江侯足下遺臨惙次冷取書江生帖江生佳須大活以始見之與人上蕭索可歎張令帖知賢室委頓何以使爾甚助耿耿念勞心知得廿四問亦得叔虎廿二日書云新年乃得發安石昨必欲剋潘家欲剋廿五日也足下以語張令未前所經繇足下近如似欲見今送丘令帖丘令送此宅圖云可得卌畝爾者為佳可與水丘共行視佳者決便當取問其賈何侯帖去冬臨臨安事近便欲決去而何侯不許事聞以有小寇今未便得果然故有移南意尚未可倉卒復信更具信汝也太常帖太常故患胛灸俞體中可可耳僕射事已行以表讓未知恕不未復司州旨告懸竦鄱陽歲使應有書而未得司馬帖小大佳不可得司馬問懸情適安以中軍出鎮有避賢意乃云行得言面不知公私此理卒當之耶甚憂真本無集之者想今與君書一又不得司馬近問懸情近所送書即至也君信明早令得後得鄙書未至即想東不久耳又司馬雖篤疾久頃轉平除無他感動奄忽長逝痛毒之甚驚惋摧慟痛切五內當奈何奈何省書感哽又司馬疾篤不果西憂之深公私無所成又二月廿日羲之白不可言得六日告為慰寒想各安善司馬與無還問耿耿僕可耳力不具王羲之白中書帖舍內佳不中書何似家中疾篤恒救旦夕比知覺有省書想至明府帖前從洛至此未及就彼參承願夫子勿悒悒矣當日緣明府共飲遂闕問願足下莫見責羲之頓首長史帖冷過足下夜得眠不祗差也復何治甚耿耿長史復何似故問具示王羲之白鎮軍帖鎮軍昨至欣尚未見也尋見之悲欣不可言義興帖義興何似懸情慕容遂來據鄴可深憂官復遣軍可以示義興中書又此雨足何耳故當收佳云彼甚快大事吳義興是蕩然可歎吳興帖隔以久諸懷既不可言且今多慘戚遲君果前蹔得一散懷知以多疾不果乃當秋事省告同此歎恨如何可言葬事不可倉卒當在九月初過此故欲一與吳興集冀無不剋耳然事來萬端不知如人意不非書能悉君數告以慰之耳又六月十六日羲之頓首秋節垂至痛悼傷惻兼情切割奈何奈何此雨過得十日告知君如常吳興轉勝甚慰想得此涼日佳患散乃委頓耿耿且以佳興消息僕故是常耳劣劣解日力不次王羲之頓首又墳墓在臨川行欲改就吳中終是所歸中軍往以還田一頃烏澤田二頃吳興想弟可還以與吾故示想弟居意故如往言忠終高也是以思同之永興帖廿二日羲之報近得書即日又得永興書甚慰想在道可耳吾疾故爾沈滯憂悴解日面近不具羲之報臨川帖不得臨川問懸心不可言子嵩之子來數有使冀因得問示之上虞帖足下欲同至上虞一宿還無所廢吾初至便與長史俱行無不可不又小大皆佳也度有近問不得上虞甚佳足下當能相就不思面卿前云當來何能果也遲散無喻吾後月當出以省念示潁陽帖行政五十日不復得問懸情皆佳也何貽云得潁陽書平安慰意不得吳諸人問懸遲之鄱陽帖七月十三日告鄱陽兄弟大降制終去悔悼甚永絕悲傷痛懷切割心情也東陽帖近日東陽絕無常憂心何可言想足下當盡能致先生帖先生適書亦小小不能佳大都可耳此書因謝常侍信還令知問可令謝長史且消息又先生頃可耳今日略至遲委垂知樂公可為之慰桃膠易得可以少耶專一物不移乃不忠也充迎不致意知陽意事迎願人之善夫人帖吾去日盡欲留女過吾去自當送之想可垂許一出未知還期是以白意夫人涉道康和足下小大皆佳度十五日必濟江故二日知問須信還知定當近道迎足下也可令時還遲面以日為歲又尊夫人向來復何如為何所患甚懸情念卿累息具至羲之敬問又夫人遂善平康也足下各可不冀行復面王羲之頓首又旦極寒得示承夫人復小欬不善得眠助反側想小爾復進何藥念足下猶悚息卿可不吾昨暮復大吐小噉物便爾旦來可耳知足下念王羲之頓首又尊夫人不和想小耳今以佳念累息卿佳不吾故劣劣力知問王羲之敬問女壻帖取卿女壻為長史休種知何似耿耿司州帖得司州書轉佳此慶慰可言云與君數數或採藥山崖可願樂遙想而已云必欲剋餘杭之遲期此不可言要須君旨問僕事中久宜蹔東復令白便行還便行當至剡槌上二十日後還以示政當與君前期會耳遲此情兼二三又知諸賢往數見范生亦得其近書為慰又得孔生書亦云不能數何爾耶江生可耳斷絕冀涼集也得司州十六日書諸疾患至憂之至深矣有斷未想桓公數便亦知謝生大得情和至慰安以當至吳興遲見之也又適太常司州鎮軍諸人廿五六書皆佳司州以為平復此慶慶可言餘親親皆佳大奴以還吳也冀或見之又司州供給寥落去無期也不果者公私之望無理或復是福得大等書慰心今因書也野數言疏平安定太宰中郎又得書知問吾夜來腹痛不堪見卿甚恨想行復來脩齡來經日今在上虞月末當去重熙旦便西與別不可言不知安所在未審時意云何甚令人耿耿敬豫帖上下安也和緒過見之欣然敬豫乃成委頓令人深憂江生亦連病今已差敬和帖上下無恙從妹佳也得敬和近問不人有至憂其疾者令人深憂隔久何日能來又敬和在彼尚來議還增耿耿敬祖帖比見敬祖小大可耳念孫阮諸人皆何似耿耿敬親帖敬親今在剡其後復亡甚不可言穰鐵不知已得敬倫帖九月三日羲之報敬倫遮諸人去晦祥禫情以酸割念卿傷切諸人豈可堪處奈何奈何及書不既羲之批又十九日羲之報近書反至也得八日書知吳故羸敬倫動氣發耿耿想得冷此為佳也敬文佳不一一羲之報延期帖汝當須過殯還恒有悲惻王延期省又七日告期痛念玄度未能心汝臨哭悲慟何可言言及惋塞夜市器俱不合用令摧之也吾平平但昨來念玄度體中便不堪之耶又十一月十三日告期等得所高餘姚并吳興二十八日二疏知竝平安慰吾平平比服寒食酒如似為佳力因王會稽不一一阿耶告知又兄弟上下遠至此慰不可言嫂不和憂懷深期等殊勿勿燋心又期小女四歲暴疾不救哀愍痛心奈可奈何吾衰老情之所寄惟在此等奄失此女痛之纏心不能已已可復如何臨紙情酸又期已至遲還具足下問耳當力東論道家無緣省苦但有悲慨不得東此月問又羲之死罪小大悉以來未惶不可懷未復諮誨問懸情計賓命行應至遲下公還具承問妹極得散力以為至慰期等故爾耳因緣不多白羲之死罪又得書知足下問吾既不佳賢內妹未差延期官奴帖延期官奴小女竝得暴疾遂至不救愍痛心奈何吾以西夕至情所寄惟在此等以禁慰餘年何意旬日之中二孫夭命日夕左右事在心目痛之纏心無復一至於此可復如何臨紙咽塞又延期官奴小女病疾不救痛愍貫心吾以西夕情願所種惟在此等豈圖十日之中二孫夭命惋傷之甚未能喻心可復如何又羲之頓首二孫女夭傷悼痛切心豈意一旬之中二孫至此傷惋之甚不能已已可復如何羲之頓首又官舍佳也節氣不適可憂彼云何昨得羲書比佳甚慰甚慰得官奴晉寧書賓平安念懸心此粗佳一日書此一一又數有想常達還此不快鄙人得夏常爾公為爾差念足下小大佳憂卿可耳想同數得問官奴婦產復委篤憂之深餘粗可耳知足下念差免憂之不具羲之白穆松帖伏想嫂安和自下悉佳松上下至乖隔十八年復得一集且悲且慰何指喻嫂疾至篤憂懷甚深穆松難為情地自慰猶小差然故忽忽冀得涼漸和耳又日月如馳嫂棄背再周去月穆松大祥奉瞻廓然永惟悲摧情如切割汝亦增慕省疏酸感又六月二十七日羲之報周嫂棄背再周忌日大服終此晦感摧傷悼兼情切劇不能自勝奈何奈何穆松垂祥除不可居處言以酸切及領軍信書不次羲之報又七月十六日羲之報凶禍累仍周嫂棄背大賢不救哀痛兼傷切割心情奈何奈何遣書感塞羲之報又君大小佳不松廬善斲也僕信還奉州將去月十二日告甚慰如曹失護語此君甚康壯常是肥渴耳實尋還遲之不可言二妹差佳慰問心期中冷頃時行可畏愁人又上下近問慰馳情不知何似絕不得松問汝得旨問馳白宜豫知分春事也吾日東可語期令知消息遮何日西帖官舍佳也得諸舍問不不知遮何日西言及辛酸卿不可懷期等故勿憂勿憂深又庾雖篤疾謂必得治力豈圖凶問奄至痛惋情深半年之中禍毒至此尋念相摧不能已已況弟情何可任遮等荼毒備盡當何可忍視言之酸心奈何奈何農敬親帖農敬親同日至至數日耳道路平安為慰妹且停為大慶又若來大小祥當復出者殊更良昌若汝不出農當單出汝能遣農速行不諸宜皆當自詳計審日遲望而更未定殊更悵恨不可言又此乃為汝求宅謂汝來居止理軍千何可久處而情事不得從意可歎可歎終果來居者故當為汝求也以書示農告姜帖六日告姜復雨始晴快情汝母子平安又二十七日告姜汝母子佳不力不一一耶告阿刁帖阿刁近來到卞上下皆佳姜夫數白迎慶帖上下可耳產行往當迎慶思之不可言和方帖群從彫落將盡餘年幾何而禍痛至此舉目摧喪不能自喻且和方左右時務公私所賴一旦長逝相為痛惜豈惟骨肉之情言及摧惋永往奈何表妹委篤示致問荒憒不得此熱不能不取給腹中便復惡無賴道沖帖群從書皆佳道沖書平安汝當改葬不可云勞沖遇此事或復連留豹奴帖羲之頓首昨得書問所疾尚綴綴既不能眠食深憂慮懸吾情至不能不委嫂故不差豹奴晚不歸家隨彼弟向州也前書云至三月間到之何能盡情憂足下所惠極為慰也不謂也野大帖野大皆當以至不得還問懸心大得善悉也野當不能遏卿竝轉茂清談又想諸舍人小大皆佳弟摧之可為心且得集目下此慰多矣姊累告安和梅妹大都可行袁妹極得石散力然故不善佳疾久尚憂之想野久恙至善分張諸懷可云不知其期何時可果永嘉競逐者有力恐難冀得大柿當種之又吾惟辨辨便知無復日也諸懷不可言知彼人已還吾此猶有小小往來不欲來者其野近當往就之耳不大思其方不見可久理而任之者悠然此可歎息道護帖六月十一日羲之報道護不救疾惻怛傷懷念弟聞問悲傷不可勝奈何奈何曹妹累喪兒女不可為心如何得二十三日書為慰及還不次王羲之報賓諸人帖賓諸人佳不皆致心憶之不忘懷又賓如人往不堪致心憶之不忘懷之又想大小皆佳知賓猶爾耿耿想得夏節佳也念君勞心賢姊大都轉差然以故有時嘔食不已是老年衰疾久亦非可倉卒大都轉差為慰以大近不復服散當將陟釐也此藥為益如君告知定帖省書知定疑來汝居長謂所養雖小要為喪主劉夫人靈坐在堂政爾遠來于禮誠不可違所以狼狽遠迎汝情地信難忍交恐有性念慮得來想慰釋實引是以不復思此耳若汝能割遣無益得過喪制遂來居此乃事宜也若自量不能違哀念須吳等旦夕相喻者當來汝當自若吾意盡此也又適都十五日問清和傳賦問定寂寂當是虛也然始興郡奴屯結不肯出恐成令人邑邑想官吏長制之耳又定聽他母子哀此遂不還可令未也又不審定何日當北遇信復白遲承後問華直帖僕近脩小園子殊佳致果雜藥深可致懷也儻因行往希見比二處動靜故之常患馳情散騎癰轉利慶慰姊故諸惡反側永嘉至奉集欣憙無喻餘可耳得華直疏故爾諸惡不差懸憂順何似未復慶等近消息懸心君竝何為耶此猶未得盡集理行大剋遲此無喻華母子帖知詩患耿耿今差也華母子佳又不得東陽問想卿婦遂平復耳聾佳不謝之幼小頃可行華母子平安知足下故望蹔還歲內何理過歲必有理不思存足下復得一敘平生當可言得卿書尋省反復但有悲慨比者且當數致年知今奴帖妹轉佳慶不及啼不憶念奴殊不可言涼當迎之二奴帖與安石俱佳還七日增想投命積日不復知問弟佳寧善然復憂之不去懷吾遂沈滯兼下如近數日分無復理昨來增服陟厘丸得下不知遂斷不了無所噉而藥得停不知當復見弟理不獨下便長歎小蘇息更知問二奴庶諸人何以謝之貴奴帖貴奴差不想不成大病傷寒可畏令人憂當盡消息也阮兒帖適阮兒書其氣散暴處便危篤憂之怛怛靜婢帖此上下可耳出外解小分張也須產往迎慶思之不可言知靜婢面猶爾甚懸心又知靜婢猶未佳懸心可小須留爾遠嘉興帖得遠嘉興書計今日必度喜遲可言足下至慰今有書想足下有旨信別告具之又遠婦疾猶爾其餘可耳今取書付想具鶻等帖鶻等不佳令人獘見此輩吾衰老不復堪此彥仁帖服食而在人間此速弊分明且轉衰老政可知乃欲與彥仁集界上甚佳諸如此事皆所欣也平自可耳何所諮人外將何必拘小繩墨且令吳興不出界當可耳便因餘杭而行耶不自此會再舉難也君便可以僕書示之但俗多怪且在草澤者為爾扇動縱任恐惡之者眾又彥仁數問也脩載蹔來忻慰脩載帖小佳更致問一一適脩載書平安伯熊帖伯熊上下安和為慰可令知問叔夷子前恨不見可令熊知消息又羲之白奉告慰反側伏想比安和伯熊過見之悲酸大都可耳惟垂心羲之平平一日白比具又羲之頓首向又慘慘自舉哀乏氣勿勿知便當西且不相知來想熊能更言問力遣不次王羲之頓首長素帖羲之白霧氣足下各何如長素轉佳甚耿耿又晴快足下各佳不長素轉佳也甚耿耿故知問具示王羲之白又長素差不懸耿小大佳也得敬豫九日問故進退憂之深子卿帖羲之死罪見子卿具一一荒民惠懷最要也甚以欣慰惟願不倦為善承留此生當廣陵任佳此生處事以驗海陵江間殊令人有懷也羲之死罪死罪又十一月七日羲之報近因子卿書想行至霜寒弟可不頃日了不得食至為虛劣力及數字羲之報道長帖知道長不孤得散力疾重而邇進退甚令人憂念遲信還知問道祖帖道祖㿃下乃危篤憂怛憂怛陽主帖十五日羲之報近甚倉卒得十三日音知卿佳慰之力及陽主書不一一羲之報茂善帖九月十八日羲之頓首茂善晚生兒不育痛之惻心奈何奈何轉寒足下可不可不不得問多日懸情吾故劣力不具王羲之頓首君遠帖君遠在此乃受恩來今留之明晚其親親集想君未便至餘姚爾祖伯帖知足下數祖伯諸人問助慰絕不得兄子問懸念可言此於南北郎子帖信所懷願告某中并爾郎子意同異復云何邈然無諮敘之期每賜翰墨使如蹔展羲之死罪陽化帖頃猶小差欲極遊目之娛而吏卒守之可歎耳陽化果似小可何日得卿諸人元道帖想元道弘廣平安道克當得還不德孝帖知德孝故平平想當轉得散力每耿耿不忘懷足下小大佳不熙孝帖又不能不痛熙孝亡政爾復何於求之度政當求之內事餘理不絕求之一條當有冀不信罔然前塗願乙乙誨之以悟其心長翔帖信使甚數而無還者似書疏不可得得問宜示告之知長翔田舍比卿還當知何候須得音副民望甚善長高帖長高當蹔還耶長風帖每念長風不可居忍昨得其書既毀頓又復壯溫深可憂長平帖得告承長平未佳善得適適君如常也知有患苦耿耿念勞心食少勞甚頓還白不具王羲之再拜君服帖君服前賢弟逝沒一旦奄至痛當奈何當復奈何臨紙咽塞王羲之頓首頓首源書帖源書以發吾欲路次見之亦不欲停甚又源遂差不云尚未恭命終之何聞真長知吳興想必如意南道差不又足下各可不都五日書今送謝即至想源得免豺狼耳王羲之又源日有書徑此界中而值吾病不得見之萬恨萬恨似從魚浦不知何日當進足下必得見之也尚書中郎帖知尚書中郎差為慰不得吳興問懸心數吳中聞耳小奴在此忽患瘧比數發今日最為大都輕瘧耳尚小停今在吾廄中念猶懸心小患耳無所垂心須佳乃去又尚書中郎諸人皆佳比面雖近隔殊思卿度還旦夕又小大佳也不得尚書中書問耿耿得業書慰之又亦得業書為慰今付還安方決去不言言即卿書致建安帖四月五日羲之報建安靈柩至慈蔭幽絕垂卅年永惟崩慕痛徹五內永酷奈何無繇言告臨紙摧哽羲之報又兄靈柩垂至永惟崩慕痛貫心膂痛當奈何計慈顏幽翳十三年而吾勿勿不知堪臨始終不發言哽絕當復奈何吾頃至劣劣比加下省弟帖前使還有書哀猥不能敘懷情痛兼哀若割當奈何奈何省弟累紙哀毒之極但報書難為心懷況卿處之何可具忍有始有卒自古而然雖當時不能無情痛理有大斷豈可以之致弊何由寫心絕筆猥咽不知何言也又十一月五日羲之報適為不吾悉不適弟各佳不吾至勿勿力數羲之報又知弟不果行吾不佳面近也又近因得里人書想至知故面腫耿耿今差不吾比日食意如差而髀中故不差以此為至患至不可勞力數字令弟知聞耳又想弟必有過理得蹔寫懷若此不果後期欲難冀臨書多歎吾不復堪事比成此書便大頓兄子帖兄子發尚未有定日當送至瀾遠乖不可復言又三日先疏未得去得四日疏為慰兄書已具不復一一賢姊帖賢姊體中勝常想不憂也白屋之人復得遷轉極佳未委幾人吾齲痛所作讚又恐不任當示殷也又劉氏平安也梅妹可得袁妹腰痛冀當小爾耳汝母故若以不安食疾久憂憒當思平理也神意不同前者也又袁妹當來悲慰不言下家當慰意令知之又武妹小大佳也又得告慰為妹下斷以為至吾比日至未果殊有邑想王羲之頓首又妹不快憂勞餘平安又家月末當至止虞妹亦俱去亡嫂帖頓首頓首亡嫂居長情所鍾奉始獲奉集冀遂至誠展其情願何圖至此未盈數旬奄見背棄情至乖喪莫此之甚追尋酷恨悲惋深至痛切心肝當奈何奈何兄子荼毒備嬰不可忍見發言痛心奈何奈何王羲之頓首頓首庾新婦帖庾新婦入門未幾豈圖奄至此禍情願不遂緬然永絕痛之深至情不能已況汝豈可勝任奈何無何無由敘哀悲酸郗新婦帖李母猶小小不和馳情伏想行平康郗新婦大都小差卿大小佳中郎女帖中郎女頗有所向不今時婚對自不可復得僕德意君頗冷不大都此亦當在君耶姨母帖十一月十三日羲之頓首頓首頃遘姨母哀哀痛摧剝情不自勝奈可奈何因反慘塞不次王羲之頓首頓首又書末云得諸為慰知汝姨欲西情事難處然今時諸不易得東安書甚不欲令汝姨出懇至想自思之李氏甥帖十二日告李氏甥得六日書為吾劣劣力不一一羲之白雜帖汝宜速下不可稽留計日遲望今日亦語劉長史令速又去冬遣使想久至乖離忽四年言之歎慨豈言所喻悠悠數十卒當何期汝等將慎為上知復何云又汝尚小愁思兼至不可居處多疾足下前許歲未今暫還想必可爾故復白又行近遣書想即至此雨汝佳不得懸心吾乏劣力數字又知汝表出便去不得見汝此何可言想秋必還恐此書不復及汝不一一又比奉對對兄以釋豈一又汝不可言未知集聚日但有慨歎各慎護前與嫂試求屏風遂不得答為也又知彼乃爾切切汝乃獨坐但有憂邑懸遠不能得遣人且吾無復久意果去當南視汝等也又兒故未至不知何父知足下念問慰諸帖上婦安和婦故羸疾憂之燋心餘亦諸患又卒喜慰氣滿無他治噉數合米來三日又明或就卿圍棊邑散今雨寒未可以治謝江表付還又得書知足下問吾骯骼拘痛俛仰欲不得此何理耶願輒與相見無盡治宜足下得益使之不疑也但月又未陰沈沈恐不可針不知何以救目前甚憂悴王羲之又比信尋知足下有書可道知足下未能得果望近為然知得家問賢子動疾念甚憂慮懸得後問不分張何可久幼小故疾患無賴又山下多日不得復意問一昨晚還未得遣書得告知中冷不解更壯溫甚耿耿服何藥耶僕此日差勝尋知問王羲之頓首又念足下窮思兼至不可居處雨氣無已卿復何似耿耿善將息吾故劣力知問王羲之又若可得耳要當須吾自南但增感塞又未復知問晴快卿轉勝向平復也猶耿耿想上下無恙力知問不具王羲之敬問又人理不可得都絕每至屬致使人多歎又足下差否甚耿耿喉中不復燥耳故知問具示王羲之白又遂無雨候使人歎得諸孫書高田皆欲了又得書知足下患癤念卿無賴思見足下冀脫果力不一一王羲之白又此賢懷所禮也面一一謝二侯又五月十四日羲之近反至也得七日書知足下故爾耿耿善將息吾腫得此霖雨轉劇憂深力不一一羲之又因緣示致問非書能悉想君行有旨信又又以表書示卿政當亦不又此叚不見足下乃甚久遲面明行集冀得見卿得申近不問謝侯又十一月十八日羲之頓首頓首從弟子夭沒孫女不育哀痛兼傷不自勝奈何奈何王羲之頓首又十月十一日羲之敬問得旦書知佳為慰吾為轉差力不一一羲之敬問又廿八日羲之白得昨告承飲動懸情想小爾耳還旨不具王羲之再拜又一日不暫展至恨叱而不已便懷不果東至可恨思敘想閒暇必顧也又適都使還諸書具一一須面具懷又八月二十四日羲之頓首竟增哀感奈何奈何兩足下可耳不得問日懸心吾故劣劣王羲之頓首又君頃以何永日憶去冬不可得知如何如何又近書及至也瞻望不遠而未期蹔面如之何遲得問也謝侯數不在歎又前知足下欲居此常喜遲知定不果悵恨未知見卿期當數音問也又見此當何言恐今婦必門首有出復有將來之弊耳此願盡珍御理又懷足下可謂禮之今以志心寄卿想必至到論之救命不暇此事於今為奢遠耳要是事其本心又雨寒卿各佳不諸患無賴力書不一一羲之問又想官舍無恙吾必果二十日後乃往遲喜散恙比爾自相聞也又羲之白不復面有勞得示足下佳為慰吾卻遽又睡甚勿勿力不具王羲之白又六月十九日羲之白使還得八日書知不佳爾何耿耿僕日弊而得此熱勿勿解日耳力遣不具王羲之白又十二月一日羲之白昨得還書知極不加疾人甚憂耿耿消息比佳耳吾至乏劣為爾日日力不一一羲之報又想明日可謝諸子又十四日羲之白近反不悉兩足下佳不不得近問問無殊不佳頓劣因不一一羲之白又羲之頓首得貺知意至諸君皆困乏常想無之何緣作此煩損今付還王羲之又一日多恨知足下散動耿耿護護吾至不佳劣劣不一一王羲之頓首又初月一日羲之白忽然改年新故之際致歎至深君亦同懷近過得告故云腹痛懸情災雨比復何似氣力能勝不僕為耳力不一一王羲之又旦書至也得示為慰云小大多患念勞心遲見足下未果為結力不一一王羲之白又知書有去縣奔去誠意義官至也有禮制恐不必果耶且君在彼縣常以為得意宜思之耶意至故示羲之白又適欲遣書會得足下一面故知示羲之頓首又二十三日羲之報一日得書皆在計書所不得有反轉熱卿各佳不定何可得來遲面不一一王羲之報又冀行面遣知問王羲之白又十二月廿四日羲之報歲盡感歎得十二日書為慰大寒比可不吾故羸乏力不一一王羲之報又吾至今目欲不復見字又初月十二日羲之累書至得去月二十六日書為慰比可不僕下連連不斷無所一欲噉輒不化消諸弊甚不知何以救之罔極然及不一一羲之白又昨近有書至此故不多也遲書不悉耳又此言不可乏得知足下問吾忽忽力數字又足下知消息今故遣問使至具示之力書不一一王羲之白又民以頃情事不可不懃思自補節勤以食噉為意乃勝前者而氣力所堪不如自喪初不哭不能不有時惻愴然便非所堪哀事損人故最深益知不可不豁之又吾涉冬節便覺風動日日增甚至去月十日便至委篤事事如去春但為輕微耳尋得小差固爾不能轉勝沈滯進退體氣肌肉便大損憂懷甚深今尚得坐起神意為復可耳直疾不除晝夜無復聊賴不知當得蹔有間還得復其寫不如今忽忽日前耳手亦惡欲不得書示令足下知問又七月十五日羲之白秋日感懷深得五日告甚慰晚熱盛君比可不遲復後問僕平平力及不一一王羲之白又知君患隱何以及爾是為疲之極也一知此事恐不可以不絕骨肉之愛無論人事也乃甚憂君若自量過歎患不以輕心者一事不爾當何理耶羲之報又不得君家書疏多往來皆平安耳今年此夏節氣至惡當令人危幼小疾苦故爾憂勞不可言想非無他旱不傷白田耳又七月二十一日羲之白昨十七日告為慰極有秋氣君比可耳力及不一一王羲之頓首又得九日問亦云鄙平平想得涼轉勝以疾乃服法必解此意又來月必欲就到家而得其問云尚多溪毒當復小卻耳僕故有至臨川意尚未定自更有果南行者還乃得至壽春耳又得都九日問無他又得反又獲示知足下發動脅腫卿此疾苦甚似期一一想消一當轉佳為何治也吾為亦劣大都復是平平隔耳許日前後有其效何喻冀涼日晚散耳尋復知問王羲之又羲之頓首賢女殯歛永畢情以傷惋不能已已兄足下愍悴深至何可為心奈何奈何不能無時之痛憂卿便深今何如患深達既往吾志勿勿力知問臨書惻惻王羲之頓首又書想至陰寒想自勝常又足下行穰久人還竟應快不大都當任縣量宜其令因便任耳立俟王羲之白又十九日羲之頓首明二旬增感切奈何奈何得十二日書知佳為慰僕左邊大劇且食少至虛乏力不一一王羲之頓首又羲之死罪累白想至雨快想比安和遲復承問下官劣劣日前可力白不具王羲之死罪又及以令弟食後來想必如期果之小晚恐不展也故復旨示羲之報又甲夜羲之頓首向遂大醉乃不憶與足下別時向至道家乃解尋憶乖離其為歎恨言何能喻聚散人理之常亦復何云惟願足下保愛為上以俟後期故旨遣此信取足下過江問臨紙情塞王羲之頓首又足下識先日之言信信具又數上下問如常何可得集耶念馳情未異果為結念致問又畢力果思遲言面不可復得此與范期後月五日遂乃剋耳還遣旨進又鄙疾進退憂之甚深使自表求解職時以許乃當是公私大計然此舉不深又不宜是之於始二三無所成可以示從女其劣欲知消息又此雨過將為災想彼不必同苗稼好也又吾頃胸中惡不欲食積日勿勿五六日來小差尚甚虛劣且風大動舉體急痛何耶賴力及足下家信不能悉王羲之十月五日羲之忽有感情兼深足下得不可至前得足下似行一書為慰故不適足下昨還如常耳雖不得旨問遠得足下書輒具問為慰吾頃胸中惡不欲食積日勿勿五日來小差七日羲之白又思率府朝得書知問足下差但尚頓極之不一一又初月一日羲之報忽然改年感思兼傷不能自勝奈何奈何冀更寒諸疚比復何似不得問多日懸心不可言吾猶小差甚尚劣力遣不知羲之報又卿各何罪似先羸而處至痛憂涕深重得之思寬遣吾竝乏劣自力不報悉又十月十五日羲之頓首月半哀傷切心奈何奈何不可居忍得十三日書知問此何以恒耿耿吾至勿勿小佳更致問王羲之頓首又羲之白乖違積年每懷辛苦痛切心肝惟同此情當可居處羲之腳不踐地十五年無由奉展比欲奉迎不審能垂降不豫惟哽故先承問羲之再拜又再昔來熱如小有覺然晝故難堪知足下患之云故以圍棊是不為患吾其爾無佳自得此熱憔悴終日未果如何王羲之頓首又寒伏想安和小大悉佳奉展乃具又羲之頓首涼君可不女差不耿耿想比能果力不王羲之頓首頓首又十二月十日羲之白近復追付期想先後皆至昨得二十七日告知君故乏劣腹痛甚懸情災雨比日復何似善消息遲後問復平平不一一王羲之白又知尋遣家信遲具問又向遣書想夜至得書知足下問當遠行諸懷何可言十一必早發想至足下如向期也又十二月二十二日羲之白節近感歎情深得去月二十三日書知君故苦日耿耿善護之往不僕得大寒疾不堪甚力還不具王羲之白又適書至也知足下明還行復剋面王羲之白又小大佳也賢兄如猶當小佳然下不斷尚憂之又羲之頓首白雨無已小兒猶小差力不一一王羲之頓首又此公立德由來而嬰斯疾每以惋慨常冀積善之慶當獲潛佑契同昔人尋憶事緬然永絕哀惋深至未能喻心省足下書固不可言已矣可復奈何絕筆流涕又足下各可耳復雨可厭若吾所噉日去不復辭此意想足下明必顧之遲散羲之頓首又羲之死罪累白至也辱十四日告慰情念轉塞想善平和下官至匆匆自力白又羲之死罪諸人何似耿耿又遣令使白恐不時至耳又月十三日羲之頓首追傷切割心不能自勝奈何奈何昨反想至向來快雨想君佳方得此雨為佳深為欣喜信既乏劣又頭痛甚無疾力不具王羲之頓首又羲之頓首想創轉差僕其爾未欲佳憂憒力知問王羲之頓首又三月十三日羲之頓首近反亦至念足下哀悼之至不可勝更寒外足下何如吾劣劣力遣知問王羲之頓首又羲之白一日殊不敘闊懷得書知足下咳劇甚耿耿護之冀以散力不一一王羲之白又書成得十一日疏甚慰三舍動靜馳情先書已具不得一一又諸患者復何如懸心比疏已具不復一一又書勿勿未得遣信又不知足下問吾既不快弱小疾苦甚無賴損尚小停有定去日更與足下相聞還不具王羲之白又適書至也此人須當令埿想足下可為停之故示王羲之頓首又六月三日羲之白徂暑此歲已半感慨深可得二十七日書知足下安頓耿耿愁增患耶善消息吾至勿勿常恐一夏不可過不一一王羲之白又旦奉祠感思悲慟得書知問吾乏劣力不一一王羲之問又王逸少頓首敬謝各可不欲小集想集後能果又足下晚各何以恒灼灼吾坦之欲不復堪事內然力不一一王羲之頓首又足下各復何以恒灼灼故問王羲之白又羲之頓首君比各可不僕近下數日勿勿腫劇數爾進退憂之轉深亦不知當復何治下由食穀也自食穀小有肌肉氣力不勝更生餘患去月盡來停穀噉麵復平平耳問慰諸帖下適得書知足下問吾欲中治甚憒憒向宅上靜佳眠都不知足下來門甚無意恨不蹔面王羲之又差涼君可不今日寔顧不遲面力知問王羲之又奄至此禍情願不遂緬然永絕痛之深至情不能已況汝豈可勝任奈何奈何無由敘哀悲酸又此諸賢粗可時見省甚為簡闊遠頃異多小患而吾疾篤不得數為歎耳又秋中感懷雨冷冀足下各可耳胛風遂欲成患甚憂之力知問王羲之頓首又想小大悉佳蔡家賓至君情感益深惟當撥遣之耳又知足下散勢小差此慰無以為喻云氣力故爾復以悒怛想散患得差餘當以漸消息耳又吾頃無一日佳衰老之獘日至夏不得有所噉而猶有勞務甚劣劣又知足下連不快何爾耿耿善將適吾積羸困而下積日不斷情慮尚深殊乏自力不能悉又月半哀悼兼至奈何奈何得告承復下懸耿至勿勿願不具王羲之再拜又今遣鄉里人往口具也又四月二十三日羲之頓首昨書不悉君可不腫劇憂之力遣不具又羲之頓首闊別稍久眷與時長寒嚴足下何如想清豫耳披懷之暇復何致樂諸賢從就理當不疏吾之朽疾日就羸頓加復風勞諸無意賴促膝未近東望慨然所冀日月易得還期非遠耳深敬宜音問在數遇信悤遽萬不一陳又吾昨得一日一起腹中極調適無所為憂但顧情不可言耳又追尋傷悼但有痛心當奈何奈何得告慰之吾昨頻哀感便欲不自勝舉旦復服散行之益頓乏推理皆如足下所誨然吾老矣餘願未盡惟在子輩耳一旦哭之垂盡之年將無復理此當何益冀小卻漸消散耳省卿書但有酸塞足下念故言散所豁多也王羲之頓首又廿日羲之頓首節日感歎深念君增傷災雨君可也又僕可耳力數字王羲之頓首又七月一日羲之白忽然秋月但有感歎信反得去月七日書知足下故羸疾問觸暑遠涉憂卿不可言吾故羸乏力不具王羲之白又徂暑感懷深得書知足下故頓乏食差不耿耿吾故爾耳未果為結力不具王羲之又初月二日羲之頓首忽然今年感遠兼傷情痛切心奈何奈何念君哀窮不已羲之皇恐又足下時事少可數來至人相尋下官吏不東西未委若為言敘乖足下不返重遣信往問願知心素又吾怪足下參朝少晚不審有何事情致使如然也王羲之再拜又十月七日羲之報前過足下所得其書想殊有勞弊然叔兄子孫有數人足慰目前情至取答委曲故具示可令必達以副此志且山川甚有形勢遠想慨然又出藥精要有驗信比可致當大惠也從弟分別吾深憂慮卿女轗軻想何可處差充喜言不多耳羲之又羲之白君晚可不想比果力不具王羲之白又云足下尚停數日半百餘武瞻望不得一見卿此何可言足下疾苦晴便大熱小舩中至不易可得過夏不甚憂卿還具示問又熱日更甚得書知足下不堪之同此無賴早且乘涼行欲往遲散也王羲之又七月六日羲之白多日不知問邑邑得二日書知足下昨問耿耿今已佳也又月末必往遲見君無以為喻又承足下還來已久別欲參慰為染患不能得往問眷仰情深豈此委具一兩日少可尋冀言展若因行李願存故舊今遇賢弟還得數張紙勞動幸不怪耳謹此代申不具又雪候既不已寒甚盛冬平可苦患足下亦當不堪之轉復知問王羲之又知君當有分住者念處窮毒而復分乖尚可居情想反理斷當又旦反想至所苦晚差不耿耿僕腳中不堪沈陰重痛不可言不知何以治之憂深力不具王羲之頓首又深以自慰理有大斷其思豁之令盡足下勿乃憂之足下殊當憂吾故具示問又晚復毒熱想足下所苦竝以佳猶耿耿吾至頓劣劣冀涼意散力知問王羲之頓首又足下家極知無可將接為雨遂乃不復更諸弟兄問疾深護之不具王羲之白又知彼清晏歲豐又所使有無一鄉故是名處且山川形勢乃爾何可以不游目又八日羲之頓首多日不知君問得一昨書知君安善為慰僕比小差而疲劇昨若耶觀望乃苦輿上隱痛前後未有此也然一日一昔勞復不極以此為慰耳力不又鄉里人樂著縣戶今送其名可為領受君頃就轉佳不僕自秋便不佳今故不善差頃還少噉脯又時噉麵亦不以為佳亦自勞弊散係轉久此亦難以求泰不去人間而欲求方外此或速弊皆如君言又便大熱足下晚可耳甚患此熱力不具王羲之白又發瘧比日疾患欲無賴未面邑邑反不具王羲之白又得書知問腫不差乏氣忽忽面近羲之報又足下各如常昨還殊頓胸中淡悶于嘔轉劇食不可強疾高難下治乃甚憂之力不具王羲之又闊轉久勞想豈舍知足下常同之卒未近緣如何足下數令知問又十一月四日羲之白冬中感懷深始欲寒足下常疾何如不得近問邑邑吾故苦心痛不得食經日甚為虛頓力及不具王羲之白又不得執手此恨何深足下各自愛數惠告臨書悵然又此蒸濕難為人得示知足下故爾堪行想不成病耳吾至無賴行剋王羲之頓首又羲之白昨故遣書當不相遇知君還喜慰足下時行想今善除猶耿耿僕時行以十一日而不除如比日便成委頓今日猶當小勝不知能轉佳不積不卿至劣劣力還不具王羲之白又月半哀感奈何奈何念邑邑罔極之至不可居處比日何似痺差不悒悒力知問王羲之頓首又日五期結極以大先師之言皆著推此言之無驗如此事君當欲知故及宜停宅又適欲遣書云得示知足下得涼以為佳甚慰知多疾患念勞心吾故不欲食比來以為事恐不可久邑邑思面行故果之王羲之又初月十三日山陰羲之報近欲遣此書停行無人不辨遣信昨至此且得去月十六日書雖遠為慰過囑卿佳不吾諸患殊劣劣方涉道憂悴力不具羲之報又隔日不面懸遲何極計足下須人兼具此等事勢速令垂報也又重告慰情吾腹中小佳體痺乏氣便轉差深以為慰慰足下意也王羲之頓首又羲之白不審尊體比復何如遲復奉告羲之中冷無賴尋復白羲之白又羲之頓首快雪時晴佳想安善未果為結力不次王羲之頓首山陰張侯又舊志志道意甚懃至不知為盡心朝夕而已有所希耳一自任之耳當以君書示又九日以當力見又祠物當治護信到便遣來忽忽善錯也又思言敘卒何期但有長歎念告女蔞丸帖知足下哀感不佳耿耿吾下勢腹痛小差須用女蔞丸得應甚速也吳興鮓帖今付北方脯二夾吳興鮓二器蒜條四千二百紫石散帖二十九日羲之報月終哀摧傷切奈何奈何得昨示知弟下不斷昨紫石散未佳卿先羸甚羸甚好消息吾比日極不快不得眠食殊頓勿令合陽冀當佳力不一一王羲之報新栗帖復數橘子即云乃好可噉久得新栗此院冬桃不能得多送觸事何當不存往恒語然獨折須果帖知須果栽便可遣取視君勢陳欲欲無出理矇風膠帖矇風膠今年似晚來年其主不起首者想或可得借乎噉蚶帖蚶二斛厲二斛前示噉蚶得味今旨送此想噉之故以為佳比來食日幾許得味不具示須米帖知須米告求常如雲此便大乏勑以米五十斛與卿有無當其何以論借又今有教勑付米可送之麻紙帖下近欲麻紙適成今付三百寫書竟訪得不得其人示之噉豆帖噉豆鼠傷如佳今送能噉不鯉魚帖羲之白送此鯉魚征與敬耶不在不乃邑邑不舍子帖信云舍子別送乃是北方物也何以欲此欲幾許致此四紙飛白以為何以能學不擇藥帖鄉里人擇藥有發夢而得此藥者足下豈識之不乃云服之令人仙不知誰能試者形色故小異莫亦嘗見者謝二侯卭竹杖帖周益州送此卭竹杖鄉尊長或須今送狼毒帖須狼毒市求不可得足下或有者分三兩停須故示採菊帖不審復何以永日多少看未九日當採菊不至日欲其行也但不知當晴不耳倫等還殊慰意增慨知足下疾患小佳當惠緣想示能果遲此善散非直思想而已也尋復有問足下以數示由為諸力不具黃甘帖奉黃甘二百不能佳想故得至耳船信不可得不知前者至不奉橘帖奉橘三百枚霜未降未可多得白石枕帖白石枕殊佳物深感卿至裹鮓帖裹鮓味佳令致君所須可示勿難當以語虞令筆精帖紙筆精要深念皃至一物而無所出後信酬愛鵝帖數日雨冷腎氣㾏腰復嗽動靜遇風緊陂湖汎漲舩不可渡勿訝謝光祿鵝在山下懸情可愛羲之遣野鴨帖損惠野鴨一雙秋來未得始是嘗新遠能分遣但深佩耶二謝鄿茶帖節日縈牽少睡鄿茶微炙善佳令姊差耶石首鯗食之消瓜成水此魚腦中有石如棊子野鴨亦有云此魚所化乾蝸青黛主風搐搦良鸕鶿帖鸕鶿糞白去䵟𪒟瘢黶令人色態此禽不卵生口吐其雛獨為異耳鷹嘴帖鷹嘴爪炙入麝香煎酥酒一盞服之治痔瘻有驗十七日羲之頓首豉酒帖又巴焦小服鼓酒至佳數用有驗直以純酒漬豉令汁濃便飲多少任意石脾帖石脾入水即乾出水便濕獨活有風不動無風自搖天下物理豈可以意求惟上聖乃能窮理東書堂帖東書堂帖想佳卿以得速還欲令今早去時反也省書增感切及反不具羲之報念足下罔戀之至不可居處白此已具委也前卻食小差數數便得疾政由不消化故二月廿日羲之頓首二旬期等小祥日近傷悼深至切割心情奈何奈何近得告為慰力及數字王羲之羲之白昨得期書知君可耳又治頭悶或患癰腫頭不即潰者以此藥帖之皆良麻巴豆薰陸石芎窮松脂六物擣如米粒許少加其分頭悶處先其巴豆三分減一松脂剃去髮方寸以帛帖藥當病上帖之周時帖刮上爛皮以生麻油和石塗上當有黃水出為佳羲之上荷華想已殘處此過四夏到彼亦屢而獨不見其盛時是亦可訝豈亦有緣耶弊宇今歲植得千葉者數盆亦便發花相繼不絕今已開二十餘枝矣頗有可觀恨不與長者同賞相望雖不遠披對邈未可期伏可勝悵惘耶近遣傳散有書想旦夕還近健步還得二十八日書吳興又道此月一日不知何以情恕修歎乃復以示法謝峰事秋便冷要且令必果想清和士人佳也此平安安不過停數日日無為樂益增想想孔長史安善足下令知問累有書也足下入年哀得俱還不思以事為歲州民王羲之死罪賢弟逝沒甚痛柰何白牋不備羲之頓首太尉門左不可言同此酸慨小大何如二妹佳為慰諸舍可何新婦委頓態人期弟各可不想今日能書暮必來宿也若宜日思夏羲之報諸賢子粗足自枝注示吾弱息毀弊大兒恒救命足令人心燋先是之懽於今皆為哀苦自非復衰年所堪豈復以既往累心率事自難為懷如之何卿女母子粗平安喪際賢女動氣疾當時乃勿勿今以除也他等皆知孝思先日之歡於今皆為哀苦觸事切人處此而能令哀惻不經於心殆空語耳一至於此何所復言此粗平安修載來十餘日諸人近集存想明日當復悉來無由同增慨東比何為慰郎以也謝諸子往矣如何得書知足下問何萬來一昔不得眠便大乏足下念王羲之勞人意以書示妹汝母不多書尋更有信也致履足下各一量當嘗長久此草書嘗多勞亦知足下書字字新奇點點圓轉美不可再書得足下閑下比來遲遲終不可也之果云云服足下五色石膏散身輕行動如飛也足下更與下七致之不治多少尋面言之委曲之事實亦人尋過江言散舊京先墓毀動奉諱號慟五內若割痛當奈何奈何王羲之頓首頓首頃日親親俓過諸婚經䘏體力不復堪之故未復遣信耳二月二日汝婦母一夜亡親親傷怛汝不可言問足下旨為致誠答今旨意致來勿忘此意自決今以資嚴知不大疾患念勞心蘭亭集序蘭亭集序永和九年歲在癸丑暮春之初會于會稽山陰之蘭亭修禊事也群賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢敘幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以游目騁懷足以極視聽之娛信可樂也夫人之相與俯仰一世或取諸懷抱悟言一室之內或因寄所託放浪形骸之外雖趣舍萬殊靜躁不同當其欣于所遇暫得于己快然自足曾不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俛仰之間已為陳迹猶不能不以之興懷況修短隨化終期于盡古人云死生亦大矣豈不痛哉每覽昔人興感之由若合一契未嘗不臨文嗟悼不能喻之于懷固知一死生為虛誕齊彭殤為妄作後之視今亦猶今之視昔悲夫故列敘時人錄其所述雖世殊事異所以興懷其致一也後之覽者亦將有感于斯文題衛夫人筆陣圖後夫紙者陣也筆者刀矟也墨者鍪甲也水硯者城池也心意者將軍也本領者副將也結構者謀略也颺筆者吉凶也出入者號令也屈折者殺戮也夫欲書者先乾研墨凝神靜思預想字形大小偃仰平直振動令筋脈相連意在筆前然後作字若平直相似狀如筭子上下方整前後齊平此不是書但得其點畫爾昔宋翼常作此書翼是鍾繇弟子繇乃叱之翼三年不敢見繇潛心改迹每畫一波常三過折筆每作一點常隱鋒而為之每作一橫畫如列陣之排雲每作一戈如百鈞之弩發每作一點如高峰墜石屈折如鋼鉤每作一牽如萬歲枯藤每作一放縱如驚蛇之透水翼先來書惡晉太康中有人於許下破鍾繇墓遂得筆勢論翼乃讀之依此法學名遂大振欲真書及行書皆依此法若欲學草書又有別法須緩前急後字體形勢狀等龍蛇相鉤連不斷仍須稜側起復用筆亦不得使齊平小大一等每作一字須有點處且作餘字總竟然後安點其點須空中遙擲筆作之其草書亦須象篆勢八分古隸相雜亦不得急令墨不入紙若急作意思淺薄筆即直過雖有章草及章程行押等不用此勢但用擊石波而已其擊石波者缺波也又八分更有一波謂之隼尾波其鍾公泰山銘及魏文帝受禪碑中已有此體夫書先須引八分章草入隸字中發人意氣若直取俗字不能先發羲之少學衛夫人書將謂大能及渡江北遊名山比見李斯曹喜等書又之許下見鍾繇梁鵠書又之洛下見蔡邕石經三體書又於從兄洽處見張昶華岳碑始知學衛夫人書徒費年月爾羲之遂改本師仍於眾碑學習遂成書耳時年五十有三或恐風燭奄及聊遺教於子孫耳可藏石室千金勿傳永和十四年四月十三日書祭墓文祭墓文維永和十一年三月癸卯朔九日辛亥小子羲之敢告二尊之靈羲之不天夙遭閔凶不蒙過庭之訓母兄鞠育得漸庶幾遂因人乏蒙國寵榮進無忠孝之節退違推賢之義每仰詠老氏周任之誡常恐斯亡無日憂及宗祀豈在微身而已是用寤寐永歎若墜深谷止足之分定之於今謹以今月吉辰肆筵設席稽顙歸誠告誓先靈自今之後敢渝此心貪冒苟進是有無尊之心而不子也子而不子天地所不覆載名教所不得容信誓之誠有如曒日蘭亭集詩二首代謝鱗次忽焉以周欣此暮春和氣載柔詠彼舞雩異世同流迺攜齊契散懷一丘仰視碧天際俯瞰淥水濱寥闃無涯觀寓目理自陳大矣造化工萬殊莫不均群籟雖參差適我無非親
