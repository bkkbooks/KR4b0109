body:
  text: 卷一遺殷浩書知安西敗喪公私惋怛不能須臾去懷以區區江左所營綜如此天下寒心固以久矣而加之敗喪此可熟念往事豈復可追願思弘將來令天下寄命有所自隆中興之業政以道勝寬和為本力爭武功作非所當因循所長以固大業想識其由來也自寇亂以來處內外之任者未有深謀遠慮括囊至計而疲竭根本各從所志竟無一功可論一事可記忠言嘉謀棄而莫用遂令天下將有土崩之勢何能不痛心悲慨也任其事者豈得辭四海之責追咎往事亦何所復及宜更虛己求賢當與有識共之不可復令忠允之言常屈於當權今軍破於外資竭於內保淮之志非復所及莫過還保長江都督將各復舊鎮自長江以外羈縻而已任國鈞者引咎責躬深自貶降以謝百姓更與朝賢思布平正除其煩苛省其賦役與百姓更始庶可以允塞群望救倒懸之急使君起於布衣任天下之重尚德之舉未能事事允稱當董統之任而喪敗至此恐闔朝群賢未有與人分其謗者今亟修德補闕廣延群賢與之分任尚未知獲濟所期若猶以前事為未工故復求之於分外宇宙雖廣自容何所知言不必用或取怨執政然當情慨所在正自不能不盡懷極言若必親征未達此旨果行者愚智所不解也願復與衆共之復被州符增運千石徵役兼至皆以軍期對之喪氣罔知所厝自頃年割剝遺黎刑徒竟路殆同秦政惟未加參夷之刑耳恐勝廣之憂無復日矣報殷浩書吾素自無廟廊志直王丞相時果欲內吾誓不許之手迹猶存由來尚矣不於足下參政而方進退自兒婚女嫁便懷尚子平之志數與親知言之非一日也若蒙驅使關隴巴蜀皆所不辭吾雖無專對之能直謹守時命宣國家威德固當不同於凡使必令遠近咸知朝廷留心於無外此所益殊不同居護軍也漢末使太傅馬日磾慰撫關東若不以吾輕微無所為疑宜及初冬以行吾惟恭以俟命與會稽王箋與會稽王箋古人恥其君不為堯舜北面之道豈不願尊其所事比隆往代況遇千載一時之運顧智力屈於當年何得不權輕重而處之也今雖有可欣之會內求諸己而所憂乃重於所欣傳云自非聖人外寧必有內憂今外不寧內憂已深古之弘大業者或不謀於衆傾國以濟一時之功者亦往往而有之誠獨運之明足以邁衆暫勞之弊終獲永逸者可也求之於今可得擬議乎夫廟算決勝必宜審量彼我萬全而後動功就之日便當因其衆而即其實今功未可期而遺黎殲盡萬不餘一且千里饋糧自古為難況今轉運供繼西輸許洛北入黃河雖秦政之弊未至於此而十室之憂便以交至今運無還期徵求日重以區區吳越經緯天下十分之九不亡何待而不度德量力不弊不已此封內所痛心歎悼而莫敢吐誠往者不可諫來者猶可追願殿下更垂三思解而更張令殷浩荀羡還據合肥廣陵許昌譙郡梁彭城諸軍皆還保淮為不可勝之基須根立勢舉謀之未晚此實當今策之上者若不行此社稷之憂可計日而待安危之機易於反掌考之虛實著於目前願運獨斷之明定之於一朝也地淺而言深豈不知其未易然古人處閭閻行陳之間尚或于時謀國評裁者不以為譏況廁大臣末行豈可默而不言哉存亡所係決在行之不可復持疑後機不定之於此後欲悔之亦無及也殿下德冠宇內以公室輔朝最可直道行之致隆當年而未允物望受殊遇者所以寤寐長歎實為殿下惜之國家之慮深矣常恐伍員之憂不獨在昔麋鹿之遊將不止林藪而已願殿下暫廢虛遠之懷以救倒懸之急可謂以亡為存轉禍為福則宗廟之慶四海有賴矣與尚書僕射謝安書與尚書僕射謝安書頃所陳論每蒙允納所以令下小得蘇息各安其業若不耳此一郡久以蹈東海矣今事之大者未布漕運是也吾意望朝廷可申下定期委之所司勿復催下但當歲終考其殿最長吏尤殿命檻車送詣天臺三縣不舉二千石必免或可左降令在疆塞極難之地又自吾到此從事常有四五兼以臺司及都水御史行臺文符如雨倒錯違背不復可知吾又暝目循常推前取重者及綱紀輕者在五曹主者涖事未嘗得十日吏民趨走功費萬計卿方任其重可徐尋所言江左平日揚州一良刺史便足統之況以群才而更不理正由為法不一牽制者衆思簡而易從便足以保守成業倉督監耗盜官米動以萬計吾謂誅剪一人其後便斷而時意不同近檢校諸縣無不皆爾餘姚近十萬斛重斂以資姦吏令國用空乏良可歎也自軍興以來征役及充運死亡叛散不反者衆虛耗至此而補代循常所在凋困莫知所出上命所差上道多叛則吏及叛者席卷同去又有常制輒令其家及同伍課捕課捕不禽家及同伍尋復亡叛百姓流亡戶口日減其源在此又有百工醫寺死亡絶滅家戶空盡差代無所上命不絶事起或十年十五年彈舉獲罪無懈息而無益實事何以堪之謂自今諸死罪原輕者及五歲刑可以充此其減死者可長充兵役五歲者可充雜工醫寺皆令移其家以實都邑都邑既實是政之本又可絶其亡叛不移其家逃亡之患復如初耳今除罪而充雜役盡移其家小人愚迷或以為重於殺戮可以絶姦刑名雖輕懲肅實重豈非適時之宜邪與謝安書與謝安書一知君嘗得小笙笙是名器往聞者若令諸君聞之皆當可不言而云見今笙者皆不以為佳恐是不能好也又復與君此章草所得極不為少而筆至惡殊不稱意與謝安書二蜀中山水如峨眉山夏含霜雹碑板之所聞崑崙之伯仲也與桓溫箋謝萬才流經通處廊廟參諷議故是後來一器而今屈其邁往之氣以俯順荒餘近是違才易務矣誡謝萬書誡謝萬書以君邁往不屑之韻而俯同群辟誠難為意也然所謂通識正自當隨事行藏乃為遠耳願君每與士之下者同則盡善矣食不二味居不重席此復何有而古人以為美談濟否所由實在積小以致高大君其存之與吏部郎謝萬書與吏部郎謝萬書古之辭世者或被髮佯狂或污身穢迹可謂艱矣今僕坐而獲免遂其宿心其為慶幸豈非天賜違天不祥頃東遊還修植桑果今盛敷榮率諸子抱弱孫遊觀其間有一味之甘割而分之以娛目前雖植德無殊邈猶欲教養子孫以敦厚退讓戒以輕薄庶令舉策數馬倣佛萬石之風君謂此何如比當與安石東遊山海并行田視地利頤養間曠衣食之餘欲與親知時共歡宴雖不能興言高詠銜杯引滿語田里所行故以為撫掌之資其為得意可勝言耶常依陸賈班嗣楊王孫之處世甚欲希風數子老夫志願盡於此矣與人書張芝臨池學書池水盡黑使人耽之若是未必後之也又君學書有意今相與草書一卷章草帖皇象章草旨信送之勿勿當付良信與所知書子敬飛白大有意飛白帖省飛白乃致佳造次尋之乃欲窮本無論小進也稱此將青於藍又致比四紙飛白以為何似能學不又飛白不能乃佳意乃篤好此書至難或作復與卿辭舉帖前得君書即有反想至也謂君前書是戲言耳亦或謂君當是舉不失親在安石耳省君今示頗知如何老僕之懷謂君體之方復致斯言愧誠心之不著若僕世懷不盡前者自當端坐觀時直方其道或將為世大明耶政有救其弊算之熟悉不因放恕之會得期於奉身而退良有已良有已此共得之心不待多言又餘年幾何而逝者相尋此最所懷之重者頃勞藥石之資如有萬一方欲思盡頤養過此以往未之敢聞言盡於今也辭郡帖篤不喜見客篤不堪煩事此自死不可化而人理所重如此都郡江東所聚自非復弱幹所堪足下未知之耳給領與卿同殊為過差交人士因開門以勉待之無所復言恭命帖六日昨書信未得去時尋復逼或謂不可以不恭命遂不獲已處世之道盡矣何所復言殊遇帖羲之死罪復蒙殊遇求之本心公私愧歎無言以喻去月十一日發都違遠朝廷親舊乖離情懸兼至良不可言且轉遠非徒無咨覲之由音問轉復難通情慨深矣故旨遣承問還願具告羲之死罪會稽帖會稽亦復與選論卿否吾誠勑勑於論事然於弟尚不惜小宜謂選官前意已佳可不復煩重卿更思必謂宜論者必有違矣此郡帖此郡之弊不謂頓至於此諸逋滯非復一條獨坐不知何以為治自非常才所濟吾無故舍逸而就勞歎恨無所復及耳夏人事請託亦所未免小卻冀得小差頃日當何理上虞縣事帖賊以還不知遇官軍云何可深憂之欲依上虞初到別上今勑聽之縣事不同直不相連耳又近所示欲依上虞別上申一期尋案臺報不聽上當戮力於事不可但復解散君縣乃是今勝縣而復以為難耶又知足下以界內有此事便欲去縣豈有此理此縣弊久因足下始有次第耳必無此理便當息意今勑諸處事及縣者省馳書於臺中論必釋然故遣旨信示意諸暨帖諸暨始寧屬事自可得如教丹陽意簡而理通屬所無復逮録之煩為佳想君不復須言謝丹陽亦云此語君餘姚帖足下所欲餘姚地輒勑驗所須輒告軍府帖此三頃田樂吳舊耳云卿軍府甚多田也宜須一用心吏可差次忠良湖孰帖吾湖孰縣須水田卿都可遣僦之墓不知處去年僦之者似是俞進可問之卿不出停此郡荒帖知郡荒吾前東周旋五千里所在皆爾可歎江東自有大頓勢不知何方以救其弊民事自欲歎復為意卿示聊及斷酒帖斷酒事終不見許然守之尚堅弟亦當思同此懷此郡斷酒一年所省百餘萬斛米乃過於租此救民命當可勝言近復重論相賞有理卿可復論又百姓之命倒懸吾夙夜憂此時既不能開倉庾賑之因斷酒以救民命有何不可而刑猶至此使人歎息吾復何在便可放之其罰謫之制宜嚴重可如治日每知卿同在民之主奉法帖省示知足下奉法轉到勝理極此此故蕩滌塵垢研遺滯纍可謂盡矣無以復加漆園比之殊誕謾如下言也吾所奉設教意政同但為形迹小異耳方欲盡心此事所以重增辭世之篤今雖形係於俗誠心終日常在於此足下試觀其終簿書帖恐有簿書之煩益屬所事可立制縣不給下貧而給饒有之家開令治國別許為盛田不平者嚴制如此事省而虛實可知其或非所樂而絶付給者今為不賦得里人遂安黃籍前年皆斯人非復一條可歎今便獨坐令白郗侯求官邈等想必可得君亦當得見書若萬一不樂想可共思得州數十家見經營不爾無坐此理也別當以具慰深共思不待煩言增運帖增運白米來者云必行此無所復云吾於時地甚疏卑致言誠不易然太老子以在大臣之末要為居時任豈可坐視危難今便極言於相并與殷謝書皆封示卿勿廣宣之諸人皆謂盡當今事宜直恐不能行耳足下亦不可思致若言耶人之至誠故當有所面不爾坐待死亡耳又知數致苦言於相時弊亦何可不耳頗得應對不吾書未被答得桓護軍書云口米增運皆當停為善防民帖行當是防民流逸不以為利耶此於郡為由上守郡更尋詳若不由上命而斷中求絶者此為以利卿絶之是也更尋詳具白若不由上縱民所之恐有如向者流散之患可無善詳具聞深情帖省足下前後書未嘗不憂欲與事地相與有深情者何能不恨然古人云行其道忘其為身真卿今日之謂政自當豁其胸懷然得公平政直耳未能忘已便自不得行然此皆在足下懷願卿為復廣求於衆所悟故多山之高言次何能不從宜帖省告一一足下此舉由來吾所具卿所云皆是情言然權事慮之重則當廢情以從宜非書所悉見卿一一玄同帖論亦不能佳體懷省無所乏然卿供給人士及使役吏人論者亦謂大任意在世中政自不得不小俯仰同異卿復為意卿此懷亦當玄同不能勉人耳誠理帖知以智之所無奈何不復稍憂此誠理也然之懷何能已已乎未能得面書何所悉怛深得近期暫還故因教初月日資生帖上方寬博多通資生有十信之覺是所委息乃有南眷情足謂何以密示一勿宣此意為與卿共思之省以付火慕容帖諸人十二日書云慕容乃抄梁下得數目下疾疫非常乃以至京極有傷此憂之下者想君勤勤之渭南帖二十三日發至長安云渭南患無他然云苻健衆尚七萬苟及最近雖衆由匹夫耳即今剋此一假不知歲終云何守之想勝才弘之自當有方耳方軌帖賊勢可見此云方軌萬萬如志但守之尚足令智者勞心此回書恆懷湯火處世不易豈惟公道群凶帖卿事時了甚快群凶日夕云云此使鄴下一日為戰場極令人惆悵豈復有慶年之樂耶思卿一面無緣可歎可歎送袍帖可委行使耶遲還具問亦以與尚書咨懷今復遣咨吳興也志嶠帖良深路滯久矣況今季末無所多怪足荒何恤於此足下志嶠外有由來及然以勢觀之卿入貴於不令耳書政當爾王羲之白此聲帖吾為卿任此聲者但此懷自不復得闕之於時十四日諸問如昨云西有伐蜀意復是大事速送袍來又給船帖君欲船輒勑給所須告之功曹帖省告攝功曹事一一屬以所求寬逋廢守命必欲肅之是以間意其志既立不得不必行發詔帖遂當發詔催吾帝王之命是何等事而辱在草澤憂歎之懷當復何言見足下一一軍使帖直遣軍使者可各差十五人耶合三十人足周事仲舒帖足下似有董仲舒開閉陰陽法可勑令料付不雨憂之深珍重謝二侯尚書帖見尚書一日遣信以具必宜有行者情事恐不可委行使耶遲還具問亦以與尚書咨懷今復遣咨吳興也又所欲論事今付荀葛帖羲之死罪荀葛各一國佐命宗臣觀其轍迹實奇士也然荀獲譏於憂卒意長恨恨謂其弘濟之心宜被大道諸葛經國達治無間然處事而無玷纍獲全名於數代至於建鼎足之勢未能忘已所謂命世大才以天下為心者容得爾乎前試論意久欲呈多疾憒憒遂忘致今送願因暇日可垂試省大期賢達興廢之道不審謂粗得阡陌不文集帖比日尋省卿文集雖不能悉周遍尋玩以為佳者名固不虛序述高士所傳小有異同見卿一一問應止楊王孫前以共及意同可誠述敘之耶暇日無為想不忘之歌章帖歌章輒付卿或有寫書人者可寫一道與吾也付十一板書王散騎筆篤患餘不一一戲詠帖得君戲詠承念至此年乃未見月儀書日往月來元正首祚太簇告辰微陽始布罄無不宜和神養素十七帖十七日先書郗司馬未去即日得足下書為慰先書以具示復數字又吾前東粗足作佳觀吾為逸民之懷久矣足下何以方復及此似夢中語耶無緣言面為歎書何能悉又瞻近無緣省告但有悲歎足下小大悉平安也云卿當來居此喜遲不可言想必果言告有期耳亦度卿當不居京此既僻又節氣佳是以欣卿來也此信旨還具示問又龍保等平安也謝之甚遲見卿舅可耳至為簡隔也又今往絲布單衣財一端示致意又足下今年政七十耶知體氣常佳此大慶也想復勤加頤養吾年垂耳順推之人理得爾以為厚幸但恐前路轉欲逼耳以爾要欲一遊目汶領非復常言足下但當保護以俟此期勿謂虛言得果此緣一假奇事也又省別具足下小大問為慰多分張念足下懸情武昌諸子亦多遠宦足下兼懷並數問不老婦頃疾篤救命恆憂慮餘粗平安知足下情至又六日知足下行至吳念違離不可居叔當西耶遲知問又計與足下別草六年於今雖時書問不解闊懷省足下先後二書但增歎慨頃積雪凝寒五十年中所無想頃如常冀來夏秋間或復得足下問耳比者悠悠如何可言又吾服食久猶為劣劣大都比之年時為復可耳足下保愛為上臨書但有惆悵又去夏得足下致卭竹杖皆至此士人多有尊老者皆即分布令知足下遠惠之至又旦夕都邑動靜清和想足下使還具時州將桓公告慰情企足下數使命也謝無奕外任數書問無他仁祖日往言尋悲酸如何可言又諸從並數有問粗平安唯修載在遠音問不數懸情司州疾篤不果西公私可恨足下所云皆盡事勢吾無間然諸問想足下別具不復乙乙又胡母氏從妹平安故在永興居去此七十也吾在官諸理極差頃比復勿勿來示云與其婢問來信不得也又得足下旃罽胡桃藥二種知足下至戎鹽乃要也是服食所須知足下謂須服食方回近之未許吾此志知我者希此有成言無緣見卿以當一笑又省足下別疏具彼土山川諸奇揚雄蜀都左太沖三都殊為不備悉彼故為多奇益令其遊目意足也可得果當告卿求迎少人足耳至時示意遲此期真以日為歲想足下鎮彼土未有動理耳要欲及卿在彼登汶嶺峨眉而旋實不朽之盛事但言此心以馳於彼矣又知有漢時講堂在是漢何帝時立此知畫三皇五帝以來備有畫又精妙甚可觀也彼有能畫者不欲因摹取當可得不信具告又云譙周有孫高尚不出今為所在其人有以副此志不令人依依足下具示又嚴君平司馬相如揚子雲皆有後否又天鼠膏治耳聾有驗不有驗者乃是要藥又朱處仁今所在往得其書信遂不取答今因足下答其書可令必達又往在都見諸葛顒曾具問蜀中事云成都城池門屋樓觀皆是秦時司馬錯所修令人遠想慨然為爾不信一一示為欲廣異聞又彼鹽井火井皆有不足下目見不為欲廣異聞具示又青李來禽櫻桃日給藤子皆囊盛為佳函封多不生足下所疏云此果佳可為致子當種之此種彼胡桃皆生也吾篤喜種果今在田里惟以此為事故遠及足下致此子者大惠也又彼所須此藥草可示當致又虞安吉者昔與共事常念之今為殿中將軍前過云與足下中表不以年老甚欲與足下為下寮意其資可得小郡足下可思致之耶所念故遠及又吾有七兒一女皆同生婚娶以畢惟一小者尚未婚耳過此一婚便得至彼今內外孫有十六人足慰目前足下情至委曲故具示桓公帖得都下九日書見桓公當陽去月九日書久當至洛但運遲可憂耳蔡公遂委篤又加帶下日數十行深可憂慮得仁祖草六日問疾更委篤深可憂當今人物眇然而艱疾若此令人短氣又知虞帥云桓公以至洛即摧破羌賊賊重命想必禽之王略始及舊都使人悲慨深此公威略實著自當求之於古真可以戰使人歎息知仁祖小差此慰可言適范生書如其語無異故須後問為定今以書示君又得謝范六日書為慰桓公威勳當求之古令人歎息比當集姚襄也又虞義興適送此桓公摧寇罔不如志今以當平定古人之美不足比蹤使人歎慨無以為喻又數得桓公問疾轉佳也每懸胡云征事未有日佳也以逼勢不知卒云何爾又鄙故勿勿飲日三斗小行四升至可憂慮如桓公書旨闕其不去恐不能平又桓公以江州還臺選每事勝也不可當在誰耳雲子帖桓公不得敘情不可居處雲子諸人何似耿耿能數省否又云停雲子代萬頃桓公至今令荀臨淮權領其府懷祖都共事已行又羲之死罪前得雲子諸人書並毀頓胡之惟分推難為心當有分西者否羲之死罪又十四日疏昨信未即取遣適得孔彭祖書得其弟都下七日書説雲子暴霍亂亡人理乃當可耳惋惋桓公周生之痛豈可為心安西帖一昨得安西六日書無他無所知説故不復付送讓都督表亦復常言耳如兄子書道嵩自必果今復與書督之足下勑令至并與遠書也又羲之死罪伏想朝廷清和稚恭遂進鎮東西齊舉想剋定有期也羲之死罪死罪又伏想清和士人皆佳適桓公十月末書為慰云所在荒甚可憂殷生數問北事勢復云何想安西以至能數面不或云頓歷陽爾耶無緣同為歎遲知問又運民不可得而要當得甚慮叛散頃為此足勞人意又安復後問不想必停君諸舍疾苦差也便疾綿篤了不欲食轉側須人憂懷深小妹亦故進退不孤得散力煩不得眠食至少疾患經月兼燋勞不可言迎集中表親疏略盡實望投老得盡田里骨肉之歡此一條不謝二疏而人理難知此不知小卻得遂本心不交衰朽羸劣所憂營如此君視是頤養之功當有何理今都絶思此事也冀疾患差末秋初冬必思與諸君一佳集遣無益快共為樂欲以少日補頃者之慘戚也追尋前者意事豈可復得且當率目前及當此急要願諸君各保愛以俟此期未近見君有諸結力聊以當面各間意必欲省安西知今意無前郤也想君必俱賊勢可之者必進許洛無可不果相遇于一世豈可度之尋常以此至終故當極盡志氣之所托也君此意弘足然決在必行又得征西近書委悉為慰不得安西許有問不知何久長風書平安今知殷侯不久留之甚善甚善庾丹陽帖知庾丹陽差數深深致心致心又適知十五日問清和為慰復得南後問不想二庾速王之始興奴長就令人邑邑想無所至耳還具示問丹陽帖昨即得丹陽水上書與足下書同故不送昨諸書付還又想大小皆佳丹陽頃極佳也云自有書不附此信耳大小問多患懸心想二奴母子佳遲卿問也又丹陽旦送吾體氣極佳共在卿故處增思詠又知比得丹陽書甚慰乖離之歎當復可言尋答其書足下反事復行便為索然良不可言此亦分耳遲面具殷侯帖昨送諸書令示卿想見之恐殷侯必行義望雖宜爾然今此集信為未易卿若便西者良不可言又昨得殷侯答書今寫示君承無怒意既而意謂速思順從或有怨理大小宜盤桓或至嫌也想復深思又得孔彭祖十七日具問為慰云襄經還蠡是反善之誠也於殷必得速還無復道路之憂比者尚懸悒得其去月書省之悲慨也又得豫章書為慰想以具問昨得都十七日書賊徑還蠡臺不攻譙是其反善之誠也想殷生得過此者猶令人憂期諸處分猶未定羊參軍旦夕至也遲面一一又殷廢責事便行也令人歎悵無已又云殷生得快罔大事數謝生書但有藥耳云彥仁或宣城甚佳情事實宜今有云想深復征許也又與殷侯彼此格卿取又與殷侯物示當爾不可不卿定之勿疑又宰相安和殷生無恙時面兄當宣兄懷彭祖帖想清和士人皆佳彭祖諸人得足下慰旦夕也此諸賢平安每面粗有歎慨追恨近日不得本善散無已已度足下還期不久耳比者數令知問袁彭祖帖袁彭祖何日過江想安穩耳失此諸賢至不可言足下分離如何可言孔建安帖太保思一散知足下歸乃至孔建安家熱乃爾往還以十實非乏所堪若之不復更剋近道惟命是往矣與郗家論婚書十一月四日右將軍會稽內史琅邪王羲之敢致書司空高平郗公足下上祖舒散騎常侍撫軍將軍會稽內史鎮軍儀同三司夫人右將軍劉女誕晏之允之允之建威將軍錢塘令會稽都尉義興太守南中郎將江州刺史衛將軍夫人散騎常侍荀文女誕希之仲之及尊叔廙平南將軍荊州刺史侍中驃騎將軍武陵康侯夫人雍州刺史濟陰郗説女誕頤之胡之耆之美之胡之侍中丹陽尹西中郎將司州刺史妻常侍譙國夏侯女誕茂之承之羲之妻太宰高平郗鑒女誕玄之凝之肅之徽之操之獻之肅之授中書郎驃騎咨議太子左率不就徽之黃門郎獻之字子敬少有清譽善隸書咄咄逼人仰與公宿舊通家光陰相接承公賢女淑質直亮確懿純美敢欲使子敬為門閭之賓故具書祖宗職諱可否之言進退惟命羲之再拜
